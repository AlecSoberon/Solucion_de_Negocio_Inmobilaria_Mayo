<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1720" viewBox="0 0 1280 1720">
<rect width="100%" height="100%" fill="#f5f7fb"/>
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#163a70" flood-opacity="0.12"/></filter>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#0f7ae5"/></marker>
</defs>
<rect x="40" y="36" width="1200" height="98" rx="26" fill="#163a70" filter="url(#shadow)"/>
<text x="70" y="84" fill="white" font-family="Inter, Arial" font-size="28" font-weight="800">Flujo operativo comercial</text>
<text x="70" y="115" fill="#dbeafe" font-family="Inter, Arial" font-size="16">Inmobiliaria Mayo · Registro de leads, selección de unidad, asignación comercial y cierre de contrato</text>
<rect x="40" y="160" width="1200" height="200" rx="24" fill="white" stroke="#d8e0ec" filter="url(#shadow)"/>
<text x="70" y="198" fill="#163a70" font-family="Inter, Arial" font-size="22" font-weight="800">1. Preparación comercial</text>
<rect x="40" y="390" width="1200" height="240" rx="24" fill="white" stroke="#d8e0ec" filter="url(#shadow)"/>
<text x="70" y="428" fill="#163a70" font-family="Inter, Arial" font-size="22" font-weight="800">2. Captación del cliente</text>
<rect x="40" y="660" width="1200" height="240" rx="24" fill="white" stroke="#d8e0ec" filter="url(#shadow)"/>
<text x="70" y="698" fill="#163a70" font-family="Inter, Arial" font-size="22" font-weight="800">3. Registro y asignación</text>
<rect x="40" y="930" width="1200" height="310" rx="24" fill="white" stroke="#d8e0ec" filter="url(#shadow)"/>
<text x="70" y="968" fill="#163a70" font-family="Inter, Arial" font-size="22" font-weight="800">4. Selección y negociación</text>
<rect x="40" y="1270" width="1200" height="340" rx="24" fill="white" stroke="#d8e0ec" filter="url(#shadow)"/>
<text x="70" y="1308" fill="#163a70" font-family="Inter, Arial" font-size="22" font-weight="800">5. Cierre y actualización</text>
<rect x="70" y="220" width="250" height="95" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
<text x="88" y="252" fill="#163a70" font-family="Inter, Arial" font-size="17" font-weight="800">Registrar proyecto</text>
<text x="88" y="278" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">G5.Proyectos: nombre,</text>
<text x="88" y="299" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">distrito, fechas y estado</text>
<text x="88" y="320" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">del proyecto</text>
<rect x="360" y="220" width="250" height="95" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
<text x="378" y="252" fill="#163a70" font-family="Inter, Arial" font-size="17" font-weight="800">Definir torres</text>
<text x="378" y="278" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">G5.Torres: torre, pisos,</text>
<text x="378" y="299" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">unidades y estado de</text>
<text x="378" y="320" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">avance</text>
<rect x="650" y="220" width="250" height="95" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
<text x="668" y="252" fill="#163a70" font-family="Inter, Arial" font-size="17" font-weight="800">Configurar unidades</text>
<text x="668" y="278" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">G5.Unidades y</text>
<text x="668" y="299" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">G5.Tipos_Unidad: piso,</text>
<text x="668" y="320" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">metraje, precio y estado</text>
<rect x="940" y="220" width="250" height="95" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
<text x="958" y="252" fill="#163a70" font-family="Inter, Arial" font-size="17" font-weight="800">Configurar canales</text>
<text x="958" y="278" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">G5.Canales y</text>
<text x="958" y="299" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">G5.Propiedad_Canal: origen</text>
<text x="958" y="320" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">propio o externo</text>
<line x1="320" y1="268" x2="360" y2="268" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="610" y1="268" x2="650" y2="268" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="900" y1="268" x2="940" y2="268" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="95" y="455" width="330" height="120" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
<text x="113" y="487" fill="#163a70" font-family="Inter, Arial" font-size="17" font-weight="800">Canal presencial</text>
<text x="113" y="513" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">Visita a sala de ventas, feria o</text>
<text x="113" y="534" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">showroom. El vendedor recopila</text>
<text x="113" y="555" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">datos y asesora al cliente.</text>
<rect x="855" y="455" width="330" height="120" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
<text x="873" y="487" fill="#163a70" font-family="Inter, Arial" font-size="17" font-weight="800">Canal virtual</text>
<text x="873" y="513" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">Formulario web, WhatsApp, correo,</text>
<text x="873" y="534" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">redes sociales o portal</text>
<text x="873" y="555" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">inmobiliario. La información se</text>
<text x="873" y="576" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">captura digitalmente.</text>
<polygon points="640,450.0 750.0,515 640,580.0 530.0,515" fill="#fff8ed" stroke="#d9822b" stroke-width="2"/>
<text x="640" y="501" text-anchor="middle" fill="#163a70" font-family="Inter, Arial" font-size="16" font-weight="800">¿Cómo llega el</text>
<text x="640" y="521" text-anchor="middle" fill="#163a70" font-family="Inter, Arial" font-size="16" font-weight="800">cliente?</text>
<text x="640" y="549" text-anchor="middle" fill="#5f6b7a" font-family="Inter, Arial" font-size="13">Presencial o virtual</text>
<line x1="530" y1="515" x2="425" y2="515" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="449.5" y="498.0" width="56" height="24" rx="12" fill="white" stroke="#d8e0ec"/>
<text x="477.5" y="515.0" text-anchor="middle" dominant-baseline="middle" fill="#163a70" font-family="Inter, Arial" font-size="12" font-weight="800">Presencial</text>
<line x1="750" y1="515" x2="855" y2="515" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="774.5" y="498.0" width="56" height="24" rx="12" fill="white" stroke="#d8e0ec"/>
<text x="802.5" y="515.0" text-anchor="middle" dominant-baseline="middle" fill="#163a70" font-family="Inter, Arial" font-size="12" font-weight="800">Virtual</text>
<rect x="80" y="720" width="255" height="115" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
<text x="98" y="752" fill="#163a70" font-family="Inter, Arial" font-size="17" font-weight="800">Aplicación 1: Registro</text>
<text x="98" y="778" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">Captura datos del cliente</text>
<text x="98" y="799" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">y canal de origen para</text>
<text x="98" y="820" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">crear el prospecto</text>
<text x="98" y="841" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">comercial.</text>
<rect x="385" y="720" width="255" height="115" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
<text x="403" y="752" fill="#163a70" font-family="Inter, Arial" font-size="17" font-weight="800">Aplicación 2: Selección</text>
<text x="403" y="778" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">Consulta unidades</text>
<text x="403" y="799" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">disponibles y vincula la</text>
<text x="403" y="820" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">unidad de interés al lead.</text>
<rect x="690" y="720" width="255" height="115" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
<text x="708" y="752" fill="#163a70" font-family="Inter, Arial" font-size="17" font-weight="800">Aplicación 3: Asignación</text>
<text x="708" y="778" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">Asigna vendedor</text>
<text x="708" y="799" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">responsable, prioridad y</text>
<text x="708" y="820" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">estado inicial de</text>
<text x="708" y="841" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">seguimiento.</text>
<rect x="995" y="720" width="170" height="115" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
<text x="1013" y="752" fill="#163a70" font-family="Inter, Arial" font-size="17" font-weight="800">Lead_Venta</text>
<text x="1013" y="778" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">Consolida</text>
<text x="1013" y="799" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">cliente, unidad,</text>
<text x="1013" y="820" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">canal, vendedor,</text>
<text x="1013" y="841" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">costo y fecha del</text>
<line x1="335" y1="778" x2="385" y2="778" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="640" y1="778" x2="690" y2="778" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="945" y1="778" x2="995" y2="778" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="80" y="1005" width="280" height="110" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
<text x="98" y="1037" fill="#163a70" font-family="Inter, Arial" font-size="17" font-weight="800">Mostrar unidades disponibles</text>
<text x="98" y="1063" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">Filtra inventario con estado</text>
<text x="98" y="1084" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">Disponible según proyecto,</text>
<text x="98" y="1105" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">torre, tipo y presupuesto.</text>
<polygon points="500,995.0 605.0,1060 500,1125.0 395.0,1060" fill="#fff8ed" stroke="#d9822b" stroke-width="2"/>
<text x="500" y="1046" text-anchor="middle" fill="#163a70" font-family="Inter, Arial" font-size="16" font-weight="800">¿Selecciona</text>
<text x="500" y="1066" text-anchor="middle" fill="#163a70" font-family="Inter, Arial" font-size="16" font-weight="800">unidad?</text>
<text x="500" y="1094" text-anchor="middle" fill="#5f6b7a" font-family="Inter, Arial" font-size="13">Sí o no</text>
<rect x="700" y="1005" width="250" height="110" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
<text x="718" y="1037" fill="#163a70" font-family="Inter, Arial" font-size="17" font-weight="800">Negociación comercial</text>
<text x="718" y="1063" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">Define descuento ofrecido</text>
<text x="718" y="1084" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">y precio de venta ofertado</text>
<text x="718" y="1105" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">en Lead_Venta.</text>
<polygon points="1080,995.0 1185.0,1060 1080,1125.0 975.0,1060" fill="#fff8ed" stroke="#d9822b" stroke-width="2"/>
<text x="1080" y="1046" text-anchor="middle" fill="#163a70" font-family="Inter, Arial" font-size="16" font-weight="800">¿Acepta oferta?</text>
<text x="1080" y="1094" text-anchor="middle" fill="#5f6b7a" font-family="Inter, Arial" font-size="13">Sí o no</text>
<line x1="360" y1="1060" x2="395" y2="1060" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="605" y1="1060" x2="700" y2="1060" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="624.5" y="1043.0" width="56" height="24" rx="12" fill="white" stroke="#d8e0ec"/>
<text x="652.5" y="1060.0" text-anchor="middle" dominant-baseline="middle" fill="#163a70" font-family="Inter, Arial" font-size="12" font-weight="800">Sí</text>
<line x1="950" y1="1060" x2="975" y2="1060" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<path d="M500 1125 C500 1190, 220 1190, 220 1115" fill="none" stroke="#d9822b" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="360" y="1195" text-anchor="middle" fill="#d9822b" font-family="Inter, Arial" font-size="13" font-weight="800">No: continuar búsqueda de unidad</text>
<path d="M1080 1125 C1080 1205, 780 1205, 780 1115" fill="none" stroke="#d9822b" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="940" y="1212" text-anchor="middle" fill="#d9822b" font-family="Inter, Arial" font-size="13" font-weight="800">No: renegociar o cambiar unidad</text>
<rect x="80" y="1345" width="250" height="105" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
<text x="98" y="1377" fill="#0c8f63" font-family="Inter, Arial" font-size="17" font-weight="800">Crear contrato</text>
<text x="98" y="1403" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">G5.Contratos: lead, fecha</text>
<text x="98" y="1424" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">de venta, descuento final</text>
<text x="98" y="1445" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">y precio final.</text>
<rect x="385" y="1345" width="250" height="105" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
<text x="403" y="1377" fill="#0c8f63" font-family="Inter, Arial" font-size="17" font-weight="800">Estado del contrato</text>
<text x="403" y="1403" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">G5.Estado_Contrato:</text>
<text x="403" y="1424" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">firmado, vigente, anulado</text>
<text x="403" y="1445" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">o rescindido.</text>
<rect x="690" y="1345" width="250" height="105" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
<text x="708" y="1377" fill="#0c8f63" font-family="Inter, Arial" font-size="17" font-weight="800">Actualizar unidad</text>
<text x="708" y="1403" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">G5.Estado_Unidad: la</text>
<text x="708" y="1424" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">unidad pasa a Vendida o</text>
<text x="708" y="1445" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">retorna a Disponible.</text>
<polygon points="1080,1333.0 1185.0,1398 1080,1463.0 975.0,1398" fill="#fff8ed" stroke="#d9822b" stroke-width="2"/>
<text x="1080" y="1384" text-anchor="middle" fill="#163a70" font-family="Inter, Arial" font-size="16" font-weight="800">¿Pago completado?</text>
<text x="1080" y="1432" text-anchor="middle" fill="#5f6b7a" font-family="Inter, Arial" font-size="13">Vigente o anulado</text>
<line x1="330" y1="1398" x2="385" y2="1398" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="635" y1="1398" x2="690" y2="1398" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="940" y1="1398" x2="975" y2="1398" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="255" y="1510" width="250" height="80" rx="18" fill="#eef6ff" stroke="#bfdbfe"/>
<text x="273" y="1542" fill="#163a70" font-family="Inter, Arial" font-size="17" font-weight="800">Contrato vigente</text>
<text x="273" y="1568" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">Venta completada y</text>
<text x="273" y="1589" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">considerada en el ratio de</text>
<text x="273" y="1610" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">conversión.</text>
<rect x="775" y="1510" width="250" height="80" rx="18" fill="#fff8ed" stroke="#fed7aa"/>
<text x="793" y="1542" fill="#d9822b" font-family="Inter, Arial" font-size="17" font-weight="800">Contrato anulado</text>
<text x="793" y="1568" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">La venta no se considera</text>
<text x="793" y="1589" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">vigente y la unidad puede</text>
<text x="793" y="1610" fill="#5f6b7a" font-family="Inter, Arial" font-size="14">liberarse.</text>
<line x1="1010" y1="1460" x2="505" y2="1510" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="729.5" y="1468.0" width="56" height="24" rx="12" fill="white" stroke="#d8e0ec"/>
<text x="757.5" y="1485.0" text-anchor="middle" dominant-baseline="middle" fill="#163a70" font-family="Inter, Arial" font-size="12" font-weight="800">Sí</text>
<line x1="1150" y1="1460" x2="1025" y2="1510" stroke="#0f7ae5" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="1059.5" y="1468.0" width="56" height="24" rx="12" fill="white" stroke="#d8e0ec"/>
<text x="1087.5" y="1485.0" text-anchor="middle" dominant-baseline="middle" fill="#163a70" font-family="Inter, Arial" font-size="12" font-weight="800">No</text>
<rect x="40" y="1640" width="1200" height="48" rx="18" fill="#e8f1ff" stroke="#d8e0ec"/>
<text x="70" y="1670" fill="#163a70" font-family="Inter, Arial" font-size="15" font-weight="700">Este flujo sirve como base para dividir la capa de aplicación en tres módulos: registro, selección de unidad y asignación comercial.</text>
</svg>